name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tests:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          # json + fileinfo: this library. curl + openssl + sodium: gimucco/atproto-php (OAuth/DPoP).
          extensions: json, fileinfo, curl, openssl, sodium
          coverage: none
      - run: composer install --no-interaction --no-progress
      - run: composer test
